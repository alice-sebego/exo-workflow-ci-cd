name: CI/CD

on:
  pull_request:
    branches:
      - main
      - develop
    types: [opened, synchronize, reopened, ready_for_review, review_requested]
  pull_request_review:
    types: [submitted]  
  push:
    branches:
      - main

jobs:

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 22]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - name: Add test results to summary
        run: echo "✅ Tests passed on Node ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - name: Add lint results to summary
        run: echo "✅ ESLint passed" >> $GITHUB_STEP_SUMMARY

  build:
    needs: [unit-tests, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "🛠️ Building application (fake build)..."
      - run: echo "Build success ✅" >> $GITHUB_STEP_SUMMARY

  deploy-dev:
    if: github.head_ref != 'main'
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: dev-deploy-${{ github.ref }}
      cancel-in-progress: true
    environment: develop
    steps:
      - run: echo "🌍 Simulating DEV deployment to ${{ vars.DEPLOY_URL }}"
      - run: |
          echo "Using token: ${{ secrets.DEPLOY_TOKEN }}"
      - run: echo "✅ Deployment to DEV complete" >> $GITHUB_STEP_SUMMARY

  auto-merge-and-create-release-pr:
    needs: deploy-dev
    if: github.event.pull_request.merged == true || success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4  # <--- ✅ Ajout essentiel ici
      - run: echo "🔁 Attempting auto-merge and release PR"
      - run: gh pr merge --auto --merge "${{ github.event.pull_request.number }}"
      - run: gh pr create --base main --head develop --title "Release to production" --body "Automated PR from develop to main"

  auto-approve:
    runs-on: ubuntu-latest
    needs: auto-merge-and-create-release-pr
    if: github.actor == 'github-actions[bot]'
    permissions:
      pull-requests: write
    steps:
      - uses: hmarr/auto-approve-action@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}    

  deploy-prod:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: prod-deploy
      cancel-in-progress: false
    environment: production
    steps:
      - run: echo "🚀 Simulating PROD deployment to ${{ vars.DEPLOY_URL }}"
      - run: |
          echo "Using production token: ${{ secrets.DEPLOY_TOKEN }}"
      - run: echo "✅ Production deployment done!" >> $GITHUB_STEP_SUMMARY
  
  auto-review:
    if: github.event_name == 'pull_request' && github.actor == 'alice-sebego'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Auto-assign PR reviewer (yourself)
        run: gh pr edit ${{ github.event.pull_request.number }} --add-reviewer "${{ github.actor }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-approve pull request
        uses: hmarr/auto-approve-action@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

